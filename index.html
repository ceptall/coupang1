    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    header h1 { font-family: var(--font-display); font-size: 3rem; line-height: 1.05; background: linear-gradient(135deg, #ffffff 30%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .update-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 11px; color: var(--text-muted); }
    .update-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .tab-bar { display: flex; justify-content: center; gap: 8px; padding: 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }

    .stat-card { background: var(--surface2); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; min-width: 100px; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; animation: fadeIn 0.5s ease both; }

    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .product-card:hover .card-img-wrap img { transform: scale(1.05); }
    .badges { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 5px; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; color: #fff; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }

  if (utEl.textContent.includes('{{')) {

  function render(items) {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var p = items[i];
      // API 필드 매핑: productPrice, productImage, productName, productUrl, isRocket, categoryName, rank
      var price = p.productPrice || 0;
      var name = p.productName || '상품명 없음';
      var image = p.productImage || 'https://via.placeholder.com/300';
      var url = p.productUrl || '#';
      var isRocket = p.isRocket || false;
      var category = p.categoryName || '기타';
      var rank = p.rank || (i + 1);

      html += '<a class="product-card" href="' + url + '" target="_blank" rel="noopener noreferrer sponsored">' +
                '<div class="card-img-wrap">' +
                  '<img src="' + image + '" alt="' + name + '" onerror="this.src=\'https://via.placeholder.com/300\'">' +
                  '<div class="badges">' +
                    '<span class="badge"># ' + rank + '</span>' +
                    (isRocket ? '<span class="badge badge-rocket">ROCKET</span>' : '') +
                  '</div>' +
                '</div>' +
                '<div class="card-body">' +
                  '<div class="card-category">' + category + '</div>' +
                  '<div class="card-name">' + name + '</div>' +
                  '<div class="card-price">' +
                    '<span class="price-sale">' + price.toLocaleString() + '원</span>' +
                  '</div>' +
                  '<span class="card-cta">최저가 확인하기</span>' +
                '</div>' +
              '</a>';
    }
    grid.innerHTML = html;
    rocketEl.innerText = PRODUCTS.filter(function(x) { return x.isRocket; }).length;
    totalEl.innerText = PRODUCTS.length;
  }

  function filterC(type, btn) {
    var btns = document.querySelectorAll('.tab-btn');
    for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
    btn.classList.add('active');
    
    if (type === 'all') {
      render(PRODUCTS);
    } else if (type === 'rocket') {
      render(PRODUCTS.filter(function(x) { return x.isRocket; }));
    } else {
      render(PRODUCTS.filter(function(x) { return x.categoryName && x.categoryName.indexOf(type) > -1; }));
    }
  }
