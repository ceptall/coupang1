
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32; --accent: #ff4444; --accent2: #ff8c00; --text: #f0f0f0; --text-muted: #888; --font-display: 'Black Han Sans', sans-serif;
      --live-green: #2ecc71;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; width: 100%; }

    header { padding: 48px 24px; text-align: center; }
    
    /* ⭐ 메인 제목: 두께 900 및 자간 조정 ⭐ */
    header h1 { 
      font-family: var(--font-display); 
      font-size: 3.5rem; 
      font-weight: 900; 
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent2) 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      margin-bottom: 24px; 
    }
    
    .update-status { 
      display: inline-flex; 
      align-items: center; 
      gap: 10px; 
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border); 
      padding: 12px 24px; 
      border-radius: 30px; 
      margin-bottom: 10px;
    }
    .live-dot { 
      width: 10px; height: 10px; background: var(--live-green); border-radius: 50%; 
      box-shadow: 0 0 12px var(--live-green); animation: blink 1.5s infinite; 
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .update-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }

    .shortcut-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; padding: 0 20px; }
    .shortcut-btn { text-decoration: none; font-size: 12px; color: #fff; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; }

    /* ⭐ 카테고리 탭: 센터 정렬 및 크기 최적화 ⭐ */
    .tab-bar { 
      display: flex; 
      justify-content: center; /* 기본 중앙 정렬 */
      align-items: center;
      gap: 12px; 
      padding: 20px; 
      background: rgba(255, 255, 255, 0.06); 
      position: -webkit-sticky; position: sticky; top: 0; z-index: 1000; 
      border-bottom: 1px solid var(--border); 
      overflow-x: auto; 
      white-space: nowrap; 
      -webkit-overflow-scrolling: touch; 
      scrollbar-width: none; 
      min-height: 80px; 
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    
    /* 항목이 넘칠 경우 왼쪽 정렬로 자연스럽게 전환되도록 처리 */
    @media (pointer: coarse), (max-width: 1024px) {
      .tab-bar { justify-content: flex-start; }
    }
    
    .tab-btn { 
      flex-shrink: 0; 
      background: transparent; 
      border: 1px solid var(--border); 
      color: var(--text-muted); 
      padding: 12px 24px; 
      border-radius: 25px; 
      cursor: pointer; 
      font-size: 16px; /* 폰트 크기 확대 */
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 800; transform: scale(1.05); }
    
    main { max-width: 1280px; margin: 0 auto; padding: 32px 20px; min-height: 800px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; transition: transform 0.3s; }
    .product-card:hover { transform: translateY(-5px); }
    .card-img-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #222; overflow: hidden; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; border: 0; }
    .card-body { padding: 18px; }
    .card-name { font-size: 14px; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; line-height: 1.4; }
    .price-sale { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); }

    @media (max-width: 768px) { 
      header { padding: 32px 16px; }
      header h1 { font-size: 2.2rem; font-weight: 900; }
      .tab-bar { padding: 15px; gap: 8px; min-height: 70px; }
      .tab-btn { font-size: 15px; padding: 10px 20px; } 
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>

  function sendHeightToParent() {
    var height = document.documentElement.scrollHeight || document.body.scrollHeight;
    window.parent.postMessage({ height: height }, '*');
    setTimeout(function() {
      var height = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ height: height }, '*');
    }, 300);
  }

  function render(items) {
    var grid = document.getElementById('mainGrid');
    if (!grid) return;
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #555;">상품 정보가 없습니다.</div>';
    } else {
      grid.innerHTML = items.map(function(p) {
        return '<a class="product-card" href="' + (p.productUrl || '#') + '" target="_blank">' +
                  '<div class="card-img-wrap">' +
                    '<img src="' + p.productImage + '" loading="lazy" onload="sendHeightToParent()">' +
                    (p.isRocket ? '<div style="position:absolute;top:10px;left:10px;background:#007aff;color:#fff;font-size:10px;padding:3px 8px;border-radius:3px;font-weight:700;">ROCKET</div>' : '') +
                  '</div>' +
                  '<div class="card-body">' +
                    '<div class="card-name">' + p.productName + '</div>' +
                    '<div class="price-sale">' + (p.productPrice || 0).toLocaleString() + '원</div>' +
                  '</div>' +
                '</a>';
      }).join('');
    }
    sendHeightToParent();
  }

  function filterC(type, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (type === 'all') render(ALL_PRODUCTS);
    else render(CAT_DATA[type] || []);
    
    var tabBar = document.querySelector('.tab-bar');
    if (tabBar) {
      var stickyPos = tabBar.getBoundingClientRect().top + window.pageYOffset;
      window.scrollTo({ top: stickyPos, behavior: 'smooth' });
    }
    sendHeightToParent();
  }

  window.onload = function() { render(ALL_PRODUCTS); };
