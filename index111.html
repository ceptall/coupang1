<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 핫딜 & 인기상품 - 쿠팡 파트너스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a32; --accent: #ff4444; --accent2: #ff8c00; --text: #f0f0f0; --text-muted: #888; --text-dim: #555; --sale: #ff4444; --badge-hot: #ff4444; --badge-new: #0099ff; --badge-sale: #ff8c00; --green: #22c55e; --card-radius: 14px; --font-display: 'Black Han Sans', sans-serif; --font-body: 'Noto Sans KR', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
    header { position: relative; padding: 32px 24px 48px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #1a0a0a 0%, var(--bg) 100%); }
    .affiliate-disclosure { font-size: 11px; color: var(--text-dim); margin-bottom: 20px; }
    .header-label { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; margin-bottom: 16px; }
    header h1 { font-family: var(--font-display); font-size: 3rem; line-height: 1.05; background: linear-gradient(135deg, #ffffff 30%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .update-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 11px; color: var(--text-muted); }
    .update-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .tab-bar { display: flex; justify-content: center; gap: 8px; padding: 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    main { max-width: 1280px; margin: 0 auto; padding: 32px 20px 80px; }
    .hero-banner { background: linear-gradient(135deg, #1a0505 0%, #0d0d0f 100%); border: 1px solid var(--border); border-radius: 20px; padding: 40px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; min-width: 100px; }
    .stat-card .num { font-family: var(--font-display); font-size: 2.5rem; color: var(--accent); }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .product-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .card-img-wrap { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #111; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .product-card:hover .card-img-wrap img { transform: scale(1.05); }
    .badges { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 5px; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; color: #fff; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    .badge-rocket { background: #007aff; }
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-category { font-size: 10px; color: var(--accent2); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .card-name { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 40px; }
    .card-price { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: baseline; gap: 6px; }
    .price-sale { font-size: 1.3rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); }
    .card-cta { display: block; margin-top: 12px; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 800; }
    footer { border-top: 1px solid var(--border); padding: 48px 24px; text-align: center; font-size: 12px; color: var(--text-dim); }
    .footer-logo { font-family: var(--font-display); font-size: 1.2rem; color: var(--text); margin-bottom: 10px; }
    .footer-logo span { color: var(--accent); }
    @media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .hero-banner { flex-direction: column; text-align: center; gap: 20px; padding: 30px; } header h1 { font-size: 2.2rem; } }
  </style>
</head>
<body>

<header>
  <p class="affiliate-disclosure">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
  <div class="header-label">COUPANG PARTNERS</div>
  <h1>오늘의 <span>핫딜</span> & 인기상품</h1>
  <div class="update-badge">
    <span class="update-dot"></span>
    <span>실시간 자동 업데이트 중: <strong id="updateTime">{{UPDATE_TIME}}</strong></span>
  </div>
</header>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="filterC('all', this)">전체보기</button>
  <button class="tab-btn" onclick="filterC('rocket', this)">로켓배송</button>
  <button class="tab-btn" onclick="filterC('가전디지털', this)">가전/디지털</button>
  <button class="tab-btn" onclick="filterC('식품', this)">식품</button>
  <button class="tab-btn" onclick="filterC('주방용품', this)">주방용품</button>
  <button class="tab-btn" onclick="filterC('생활용품', this)">생활용품</button>
  <button class="tab-btn" onclick="filterC('뷰티', this)">뷰티</button>
  <button class="tab-btn" onclick="filterC('패션', this)">패션</button>
  <button class="tab-btn" onclick="filterC('반려동물', this)">애견용품</button>
  <button class="tab-btn" onclick="filterC('스포츠', this)">스포츠/레저</button>
</div>

<main>
  <div class="hero-banner">
    <div>
      <h2 style="font-family:var(--font-display); font-size:2rem; color:#fff;">실시간 <span style="color:var(--accent)">한정 특가</span> 리포트</h2>
      <p style="color:var(--text-muted); font-size:14px; margin-top:5px;">쿠팡 API를 통해 직접 선별된 베스트셀러 상품입니다.</p>
    </div>
    <div style="display:flex; gap:10px;">
      <div class="stat-card"><div class="num" id="rocketCount">0</div><div style="font-size:10px; color:#888;">ROCKET</div></div>
      <div class="stat-card"><div class="num" id="totalCount" style="color:#fff;">0</div><div style="font-size:10px; color:#888;">TOTAL</div></div>
    </div>
  </div>
  <div class="product-grid" id="mainGrid"></div>
</main>

<footer>
  <div class="footer-logo">HOTDEAL <span>PICK</span></div>
  <p>© 2026 오늘의 특가 리포트. All rights reserved.</p>
  <p style="margin-top: 10px;">상품 가격 및 재고는 실시간으로 변동될 수 있습니다.</p>
</footer>

<script>
  /* [n8n 카테고리별 데이터 주입부] */
  var CAT_DATA = {
    "가전디지털": {{DATA_DIGITAL}},
    "식품": {{DATA_FOOD}},
    "주방용품": {{DATA_KITCHEN}},
    "생활용품": {{DATA_LIVING}},
    "뷰티": {{DATA_BEAUTY}},
    "패션": {{DATA_FASHION}},
    "반려동물": {{DATA_PET}},
    "스포츠": {{DATA_SPORTS}}
  };

  // 모든 데이터를 하나로 합치는 작업
  var PRODUCTS = [];
  for (var key in CAT_DATA) {
    if (Array.isArray(CAT_DATA[key])) {
      PRODUCTS = PRODUCTS.concat(CAT_DATA[key]);
    }
  }

  // 전역 요소 참조
  var grid = document.getElementById('mainGrid');
  var rocketEl = document.getElementById('rocketCount');
  var totalEl = document.getElementById('totalCount');
  var utEl = document.getElementById('updateTime');

  // 업데이트 시간 처리 (치환자가 남아있을 경우 현재 시간 표시)
  if (utEl.textContent.includes('{{')) {
    utEl.textContent = new Date().toLocaleString('ko-KR');
  }

  function render(items) {
    if (!grid) return;
    var html = '';
    
    // 데이터가 없을 경우 처리
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim);">해당 카테고리에 상품이 없습니다.</div>';
      return;
    }

    for (var i = 0; i < items.length; i++) {
      var p = items[i];
      var price = p.productPrice || 0;
      var name = p.productName || '상품명 없음';
      var image = p.productImage || 'https://via.placeholder.com/300';
      var url = p.productUrl || '#';
      var isRocket = p.isRocket || false;
      var category = p.categoryName || '기타';
      var rank = p.rank || (i + 1);

      html += '<a class="product-card" href="' + url + '" target="_blank" rel="noopener noreferrer sponsored">' +
                '<div class="card-img-wrap">' +
                  '<img src="' + image + '" alt="' + name + '" onerror="this.src=\'https://via.placeholder.com/300\'" loading="lazy">' +
                  '<div class="badges">' +
                    '<span class="badge"># ' + rank + '</span>' +
                    (isRocket ? '<span class="badge badge-rocket">ROCKET</span>' : '') +
                  '</div>' +
                '</div>' +
                '<div class="card-body">' +
                  '<div class="card-category">' + category + '</div>' +
                  '<div class="card-name">' + name + '</div>' +
                  '<div class="card-price">' +
                    '<span class="price-sale">' + price.toLocaleString() + '원</span>' +
                  '</div>' +
                  '<span class="card-cta">최저가 확인하기</span>' +
                '</div>' +
              '</a>';
    }
    grid.innerHTML = html;
    
    // 카운트 업데이트 (전체 PRODUCTS 기준이 아닌 현재 리스트 기준을 원하면 items.length로 변경)
    rocketEl.innerText = PRODUCTS.filter(function(x) { return x.isRocket; }).length;
    totalEl.innerText = PRODUCTS.length;
  }

  function filterC(type, btn) {
    // 버튼 활성화 상태 변경
    var btns = document.querySelectorAll('.tab-btn');
    for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
    btn.classList.add('active');
    
    if (type === 'all') {
      render(PRODUCTS);
    } else if (type === 'rocket') {
      render(PRODUCTS.filter(function(x) { return x.isRocket; }));
    } else {
      // 카테고리 필터링 개선: null 체크 및 포함 여부 확인
      var filtered = PRODUCTS.filter(function(x) {
        var catName = x.categoryName || "";
        return catName.indexOf(type) > -1;
      });
      render(filtered);
    }
  }

  // 초기 렌더링 실행
  (function init() {
    if (Array.isArray(PRODUCTS) && PRODUCTS.length > 0) {
      // 샘플 데이터 여부 확인 (n8n 주입 전후 구분)
      render(PRODUCTS);
    } else {
      // 테스트용 데이터
      PRODUCTS = [
        { productName: "상품 데이터를 불러오는 중입니다...", productPrice: 0, productImage: "https://via.placeholder.com/300", productUrl: "#", isRocket: true, categoryName: "안내", rank: 1 }
      ];
      render(PRODUCTS);
    }
  })();
</script>
</body>
</html>
