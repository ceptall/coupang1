
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a32; --accent: #ff4444; --accent2: #ff8c00; --text: #f0f0f0; --text-muted: #888; --text-dim: #555; --green: #22c55e; --font-display: 'Black Han Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html {
      scroll-behavior: smooth;
    }

    body { 
      width: 100%; 
      margin: 0; 
      padding: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Noto Sans KR', sans-serif; 
    }

    header { 
      width: 100%; 
      padding: 60px 20px 40px; 
      text-align: center; 
      border-bottom: 1px solid var(--border); 
      background: linear-gradient(180deg, #1a0a0a 0%, var(--bg) 100%); 
    }
    header h1 { font-family: var(--font-display); font-size: 3.5rem; background: linear-gradient(135deg, #ffffff 40%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    
    .update-badge { 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      margin-top: 10px; 
      background: var(--surface2); 
      border: 1px solid var(--border); 
      border-radius: 20px; 
      padding: 6px 16px; 
      font-size: 11px; 
      color: var(--text-muted); 
    }
    .update-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.9); } }

    /* 바로가기 버튼 디자인 통일 */
    .shortcut-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 25px 20px; background: var(--bg); }
    .shortcut-btn { 
      text-decoration: none; 
      font-size: 12px; 
      color: var(--text-muted); 
      background: var(--surface); 
      border: 1px solid var(--border); 
      padding: 10px 20px; 
      border-radius: 30px; 
      transition: 0.3s; 
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .shortcut-btn:hover { 
      color: #fff; 
      background: var(--surface2); 
      border-color: var(--accent); 
      transform: translateY(-2px);
    }

    /* ⭐ 탭 바 고정(Sticky) 최적화 */
    .tab-bar-wrapper {
      position: -webkit-sticky; 
      position: sticky; 
      top: -1px; /* 상단에 미세하게 걸쳐 고정력 강화 */
      z-index: 9999;
      background: #0d0d0f; /* 불투명 배경 확실히 지정 */
      border-bottom: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      width: 100%;
    }
    .tab-bar { 
      display: flex; 
      justify-content: center; /* 중앙 정렬 */
      gap: 10px; 
      padding: 16px 20px; 
      overflow-x: auto; 
      scrollbar-width: none;
      -ms-overflow-style: none;
      width: 100%;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn { 
      flex-shrink: 0; 
      background: var(--surface); 
      border: 1px solid var(--border); 
      color: var(--text-muted); 
      padding: 10px 22px; 
      border-radius: 30px; 
      cursor: pointer; 
      font-size: 14px; 
      transition: 0.3s; 
      font-weight: 500;
    }
    .tab-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; box-shadow: 0 4px 12px rgba(255, 68, 68, 0.3); }
    
    main { width: 100%; padding: 32px 20px; min-height: 100vh; }
    .product-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
      gap: 24px;
      width: 100%;
    }
    
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .card-img-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #222; overflow: hidden; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; border: 0; }
    
    .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-name { font-size: 15px; height: 44px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 12px; line-height: 1.5; color: var(--text); }
    .price-sale { font-size: 1.6rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); margin-top: auto; }

    @media (max-width: 768px) { 
      header h1 { font-size: 2.5rem; }
      .tab-bar { justify-content: flex-start; } /* 모바일은 좌측 정렬로 스크롤 유도 */
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      main { padding: 16px 12px; }
      .shortcut-btn, .tab-btn { padding: 8px 16px; font-size: 12px; }
    }
  </style>
</head>

  function sendHeightToParent() {
    var height = document.documentElement.scrollHeight || document.body.scrollHeight;
    window.parent.postMessage({ height: height }, '*');
    setTimeout(function() {
      var h = document.documentElement.scrollHeight || document.body.scrollHeight;
      window.parent.postMessage({ height: h }, '*');
    }, 500);
  }

  function render(items) {
    var grid = document.getElementById('mainGrid');
    if (!grid) return;
    
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 120px; color: var(--text-dim);">현재 준비된 상품이 없습니다.</div>';
    } else {
      grid.innerHTML = items.map(function(p) {
        return '<a class="product-card" href="' + (p.productUrl || '#') + '" target="_blank">' +
                  '<div class="card-img-wrap">' +
                    '<img src="' + p.productImage + '" alt="product" loading="lazy" onload="sendHeightToParent()">' +
                    (p.isRocket ? '<div style="position:absolute;top:12px;left:12px;background:#007aff;color:#fff;font-size:10px;padding:4px 10px;border-radius:4px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3);">ROCKET</div>' : '') +
                  '</div>' +
                  '<div class="card-body">' +
                    '<div class="card-name">' + p.productName + '</div>' +
                    '<div class="price-sale">' + (p.productPrice || 0).toLocaleString() + '원</div>' +
                  '</div>' +
                '</a>';
      }).join('');
    }
    sendHeightToParent();
  }

  function filterC(type, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    
    if (type === 'all') render(ALL_PRODUCTS);
    else render(CAT_DATA[type] || []);
    
    // 탭 클릭 시 탭 바 위치로 스크롤 이동
    var wrapper = document.querySelector('.tab-bar-wrapper');
    if (wrapper) {
      // 뷰포트 상단에서 탭바 높이만큼 고려하여 스크롤
      const yOffset = -2; // sticky 보정값
      const y = wrapper.getBoundingClientRect().top + window.pageYOffset + yOffset;
      window.scrollTo({top: y, behavior: 'smooth'});
    }
    
    sendHeightToParent();
  }

  window.onload = function() { 
    render(ALL_PRODUCTS); 
  };
