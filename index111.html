
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32; --accent: #ff4444; --accent2: #ff8c00; --text: #f0f0f0; --text-muted: #888; --font-display: 'Black Han Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

    /* 헤더 및 바로가기 */
    header { padding: 48px 24px; text-align: center; background: linear-gradient(180deg, #1a0a0a 0%, var(--bg) 100%); }
    .header-label { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); border: 1px solid var(--accent); padding: 6px 16px; margin-bottom: 20px; }
    header h1 { font-family: var(--font-display); font-size: 3.5rem; background: linear-gradient(135deg, #ffffff 40%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .shortcut-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px auto 40px; max-width: 1280px; padding: 0 20px; }
    .shortcut-btn { text-decoration: none; font-size: 12px; color: #fff; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; transition: 0.3s; }
    .shortcut-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }

    /* ⭐ 카테고리 탭 상단 고정 핵심 설정 ⭐ */
    .tab-bar { 
      display: flex; 
      justify-content: center; 
      gap: 8px; 
      padding: 16px; 
      background: rgba(22, 22, 26, 0.95); /* 약간의 투명도 주어 고급스럽게 */
      backdrop-filter: blur(10px);        /* 뒤 배경 흐림 효과 */
      position: -webkit-sticky;           /* 사파리 지원 */
      position: sticky; 
      top: 0;                             /* 최상단에 고정 */
      z-index: 1000;                      /* 다른 요소보다 위에 표시 */
      border-bottom: 1px solid var(--border); 
      overflow-x: auto; 
      scrollbar-width: none; 
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    
    main { max-width: 1280px; margin: 0 auto; padding: 32px 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-5px); }
    .card-img-wrap { position: relative; aspect-ratio: 1/1; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 18px; }
    .card-name { font-size: 14px; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; }
    .price-sale { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); }

    @media (max-width: 768px) { 
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>

  function render(items) {
    var grid = document.getElementById('mainGrid');
    if (!grid) return;
    grid.innerHTML = items.map(function(p, i) {
      return '<a class="product-card" href="' + (p.productUrl || '#') + '" target="_blank">' +
                '<div class="card-img-wrap"><img src="' + p.productImage + '">' +
                (p.isRocket ? '<div style="position:absolute;top:10px;left:10px;background:#007aff;color:#fff;font-size:10px;padding:3px 8px;border-radius:3px;">ROCKET</div>' : '') +
                '</div>' +
                '<div class="card-body">' +
                  '<div class="card-name">' + p.productName + '</div>' +
                  '<div class="price-sale">' + p.productPrice.toLocaleString() + '원</div>' +
                '</div>' +
              '</a>';
    }).join('');
    
    // 렌더링 후 부모 페이지에 높이 값 전송 (Fullpage 대응)
    window.parent.postMessage({ height: document.body.scrollHeight }, '*');
  }

  function filterC(type, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (type === 'all') render(ALL_PRODUCTS);
    else if (type === 'rocket') render(ALL_PRODUCTS.filter(x => x.isRocket));
    else render(CAT_DATA[type] || []);
    
    // 필터 클릭 시 상품 리스트 상단으로 스크롤 이동 (선택 사항)
    window.scrollTo({ top: document.querySelector('.tab-bar').offsetTop, behavior: 'smooth' });
  }

  window.onload = function() { 
    render(ALL_PRODUCTS); 
  };
