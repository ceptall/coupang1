
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --border: #2a2a32; --accent: #ff4444; --accent2: #ff8c00; --text: #f0f0f0; --text-muted: #888; --text-dim: #555; --font-display: 'Black Han Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
    
    /* 헤더 디자인 (이미지 완벽 매칭) */
    header { position: relative; padding: 48px 24px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #1a0a0a 0%, var(--bg) 100%); }
    .affiliate-disclosure { font-size: 11px; color: var(--text-dim); margin-bottom: 24px; }
    .header-label { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--accent); border: 1px solid var(--accent); padding: 6px 16px; margin-bottom: 20px; }
    header h1 { font-family: var(--font-display); font-size: 3.5rem; line-height: 1.1; margin-bottom: 24px; background: linear-gradient(135deg, #ffffff 40%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .update-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(30, 30, 36, 0.6); border: 1px solid var(--border); border-radius: 30px; padding: 8px 20px; font-size: 12px; color: var(--text-muted); }
    .update-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* 바로가기 버튼 섹션 (추가된 디자인) */
    .shortcut-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 30px auto; max-width: 1280px; padding: 0 20px; }
    .shortcut-btn { 
      text-decoration: none; font-size: 12px; font-weight: 600; color: #fff;
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 8px; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; min-width: 130px;
    }
    .shortcut-btn:hover { 
      background: var(--accent); border-color: var(--accent); transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 68, 68, 0.3);
    }

    /* 탭 및 그리드 */
    .tab-bar { display: flex; justify-content: center; gap: 8px; padding: 16px; background: var(--surface); position: sticky; top: 0; z-index: 10; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    
    main { max-width: 1280px; margin: 0 auto; padding: 32px 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; height: 100%; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-5px); }
    .card-img-wrap { position: relative; aspect-ratio: 1/1; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .badge-rocket { position: absolute; top: 12px; left: 12px; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; background: #007aff; color: #fff; }
    .card-body { padding: 18px; }
    .card-name { font-size: 14px; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; }
    .price-sale { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: var(--font-display); }
    @media (max-width: 768px) { header h1 { font-size: 2.2rem; } .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .shortcut-btn { flex: 1 1 40%; min-width: auto; } }
  </style>
</head>

  function render(items) {
    var grid = document.getElementById('mainGrid');
    if (!grid) return;
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-dim);">상품이 없습니다.</div>';
      return;
    }
    grid.innerHTML = items.map(function(p, i) {
      return '<a class="product-card" href="' + (p.productUrl || '#') + '" target="_blank" rel="noopener noreferrer sponsored">' +
                '<div class="card-img-wrap">' +
                  '<img src="' + (p.productImage || '') + '" onerror="this.src=\'https://via.placeholder.com/300\'" loading="lazy">' +
                  (p.isRocket ? '<div class="badge-rocket">ROCKET</div>' : '') +
                '</div>' +
                '<div class="card-body">' +
                  '<div class="card-name">' + (p.productName || '상품명') + '</div>' +
                  '<div class="price-sale">' + (p.productPrice || 0).toLocaleString() + '원</div>' +
                '</div>' +
              '</a>';
    }).join('');
  }

    btn.classList.add('active');
    if (type === 'all') render(ALL_PRODUCTS);
    else if (type === 'rocket') render(ALL_PRODUCTS.filter(x => x.isRocket));
    else render(CAT_DATA[type] || []);
  }

  window.onload = function() { render(ALL_PRODUCTS); };
</script>
</body>
</html>
